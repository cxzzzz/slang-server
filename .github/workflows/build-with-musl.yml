name: Build with Musl (Zero Dependency)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build-musl:
    runs-on: ubuntu-latest
    container: 
      image: alpine:3.19
    steps:
    - name: 1. 安装编译工具和依赖
      run: |
        apk add --no-cache \
          git \
          g++ \
          make \
          cmake \
          python3 \
          binutils  # 安装 binutils 以使用 strip 命令

    - name: 2. 拉取代码
      run: |
        git config --global --add safe.directory '*'
        git config --global credential.helper store
        echo "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
        
        git clone https://github.com/${{ github.repository }}.git .
        git checkout ${{ github.sha }}
        git submodule update --init --recursive

    - name: 3. 开始编译
      run: |
        mkdir build
        cd build
        
        cmake .. \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_EXE_LINKER_FLAGS="-static" \
          -DPython3_EXECUTABLE=$(which python3)
          
        make -j$(nproc)

    - name: 4. 打包发布产物
      run: |
        # 1. 定义二进制文件路径
        BINARY_PATH="build/bin/slang-server"
        
        # 2. 清理调试符号 (大幅减小文件体积，静态链接文件通常很大)
        strip $BINARY_PATH
        
        # 3. 创建临时打包目录
        mkdir -p packaging
        
        # 4. 拷贝二进制文件到打包目录
        cp $BINARY_PATH packaging/slang-server
        chmod +x packaging/slang-server
        
        # 5. 打包成 tar.gz
        cd packaging
        tar -czf ../slang-server-linux-x64-musl.tar.gz slang-server
        
        # 6. 简单打印一下信息确认
        echo "打包完成: $(ls -lh ../slang-server-linux-x64-musl.tar.gz)"

    - name: 5. 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: slang-server-musl-static
        path: slang-server-linux-x64-musl.tar.gz
