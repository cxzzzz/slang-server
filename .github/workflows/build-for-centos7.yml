name: Build for CentOS 7

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build-centos7:
    runs-on: ubuntu-latest
    container: 
      image: centos:7
    steps:
    # 不再使用 actions/checkout@v4，改用原生 git，避免 glibc 报错
    - name: 1. 安装 Git 并拉取代码
      run: |
        # 先装 git，centos 7 自带的 git 可能太老，但对拉代码够用
        yum install -y git
        
        # 拉取当前仓库代码
        # GITHUB_SHA 是 GitHub 提供的环境变量，代表最新的提交版本
        git init
        git remote add origin https://github.com/${{ github.repository }}.git
        git fetch origin ${{ github.sha }}
        git checkout ${{ github.sha }}
        
        # 如果项目包含子模块，取消下面这行的注释
        # git submodule update --init --recursive

    - name: 2. 安装编译工具 (GCC 11 & CMake)
      run: |
        yum install -y centos-release-scl epel-release
        yum install -y devtoolset-11-gcc-c++ cmake3 make
        
    - name: 3. 开始编译
      run: |
        source /opt/rh/devtoolset-11/enable
        mkdir build
        cd build
        
        # 这一步特别重要：确认 CMake 能找到源码
        # 如果上一部 git 没拉下来代码，这里会报错 CMake Error: The source directory does not appear to contain CMakeLists.txt
        cmake3 .. -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
        make -j$(nproc)

    - name: 4. 查看编译结果 (调试用)
      run: |
        ls -lh build/
        
    - name: 5. 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: slang-server-centos7-binary
        # 为了保险，这里依然写 build/ 目录，这样即使文件名不对，你也能下载整个目录
        path: build/
