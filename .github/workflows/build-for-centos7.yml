name: Build for CentOS 7

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build-centos7:
    runs-on: ubuntu-latest
    container: 
      image: centos:7
    steps:
    - name: 1. 准备基础环境
      run: |
        # 第一步：先修复基础系统的源，否则连 yum 都没法用
        sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-*
        sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*
        
        # 安装 git (用于拉代码)
        yum install -y git
        
        # 拉取代码
        git init
        git remote add origin https://github.com/${{ github.repository }}.git
        git fetch origin ${{ github.sha }}
        git checkout ${{ github.sha }}

    - name: 2. 安装 SCL 仓库并修复源
      run: |
        # 安装包含 GCC 11 的 SCL 仓库配置包
        yum install -y centos-release-scl epel-release
        
        # 关键步骤：SCL 包安装后会产生新的 .repo 文件，
        # 这些新文件里的地址也是失效的，必须再次批量修复！
        # 这条命令会修复所有 CentOS 开头的 repo 文件，包括刚装好的 SCL
        sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-*
        sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*

    - name: 3. 安装编译工具 (GCC 11 & CMake)
      run: |
        # 现在安装 GCC 11 就不会报错了
        yum install -y devtoolset-11-gcc-c++ cmake3 make

    - name: 4. 开始编译
      run: |
        source /opt/rh/devtoolset-11/enable
        mkdir build
        cd build
        
        # 静态链接以保证兼容性
        cmake3 .. -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
        make -j$(nproc)

    - name: 5. 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: slang-server-centos7
        path: build/
