name: Build for CentOS 7 (Fixed)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build-centos7:
    runs-on: ubuntu-latest
    container: 
      image: centos:7
    steps:
    - name: 1. 修复软件源 (切换到 Vault)
      run: |
        # 因为 CentOS 7 官方源已关闭，必须手动修改源地址
        sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-*
        sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*
        
    - name: 2. 安装 Git 并拉取代码
      run: |
        # 现在 yum 就能正常工作了
        yum install -y git
        
        # 拉取代码
        git init
        git remote add origin https://github.com/${{ github.repository }}.git
        git fetch origin ${{ github.sha }}
        git checkout ${{ github.sha }}

    - name: 3. 安装编译工具 (GCC 11 & CMake)
      run: |
        yum install -y centos-release-scl epel-release
        
        # 这里也需要修复 SCL 的源地址
        sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-SCLo-*
        sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-SCLo-*
        
        # 安装 GCC 11 和工具
        yum install -y devtoolset-11-gcc-c++ cmake3 make

    - name: 4. 开始编译
      run: |
        source /opt/rh/devtoolset-11/enable
        mkdir build
        cd build
        
        # 关键：静态链接，保证在 CentOS 7 上能跑
        cmake3 .. -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
        make -j$(nproc)

    - name: 5. 查看编译结果
      run: ls -lh build/

    - name: 6. 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: slang-binary-centos7
        # 上传整个 build 目录，避免找不到文件
        path: build/
