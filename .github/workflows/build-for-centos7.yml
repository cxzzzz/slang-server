name: Build for CentOS 7 (Final Fix)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build-centos7:
    runs-on: ubuntu-latest
    container: 
      image: centos:7
    steps:
    - name: 1. 修复 Yum 源并安装 Git
      run: |
        rm -f /etc/yum.repos.d/*.repo
        cat > /etc/yum.repos.d/CentOS-Vault.repo << 'EOF'
        [base]
        name=CentOS-7 - Base
        baseurl=http://vault.centos.org/7.9.2009/os/$basearch/
        gpgcheck=0
        
        [updates]
        name=CentOS-7 - Updates
        baseurl=http://vault.centos.org/7.9.2009/updates/$basearch/
        gpgcheck=0
        
        [extras]
        name=CentOS-7 - Extras
        baseurl=http://vault.centos.org/7.9.2009/extras/$basearch/
        gpgcheck=0
        
        [centos-sclo-sclo]
        name=CentOS-7 - SCLo sclo
        baseurl=http://vault.centos.org/7.9.2009/sclo/$basearch/sclo/
        gpgcheck=0
        
        [centos-sclo-rh]
        name=CentOS-7 - SCLo rh
        baseurl=http://vault.centos.org/7.9.2009/sclo/$basearch/rh/
        gpgcheck=0
        EOF
        
        yum install -y git
        git config --global --add safe.directory '*'

    - name: 2. 手动拉取代码及子模块
      run: |
        git config --global credential.helper store
        echo "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
        
        git clone https://github.com/${{ github.repository }}.git .
        git checkout ${{ github.sha }}
        git submodule update --init --recursive

    - name: 3. 安装编译工具 (GCC 11, CMake 3.28 & Python 3)
      run: |
        yum install -y epel-release
        yum install -y python3 python3-setuptools
        yum install -y devtoolset-11-gcc-c++ make
        
        curl -L https://github.com/Kitware/CMake/releases/download/v3.28.0/cmake-3.28.0-linux-x86_64.tar.gz -o cmake.tar.gz
        tar -xzf cmake.tar.gz
        mv cmake-3.28.0-linux-x86_64 /opt/cmake
        ln -s /opt/cmake/bin/cmake /usr/local/bin/cmake

    - name: 4. 开始编译
      run: |
        source /opt/rh/devtoolset-11/enable
        
        # 【关键修复】
        # 1. 强制链接器使用静态库 (-static-libstdc++)，避免加载系统旧版动态库
        # 2. 显式开启 C++17 (虽然 GCC11 默认开启，但显式写明更稳妥)
        
        mkdir build
        cd build
        
        cmake .. \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_FLAGS="-static-libstdc++ -static-libgcc" \
          -DPython3_EXECUTABLE=$(which python3)
          
        make -j$(nproc)

    - name: 5. 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: slang-server-centos7
        path: build/
